<!DOCTYPE html>
<html>
<head>
<title>Report</title>
<link rel="stylesheet" href="/static/css/style.css">
</head>

<body>

<div class="navbar">
<a href="/dashboard">Dashboard</a>
</div>

<div class="container">

<a href="/dashboard" class="btn btn-secondary">← Back</a>

<h2>Forensic Report</h2>

<table>

<tr>
<th>ID</th>
<th>File</th>
<th>Hash</th>
<th>Status</th>
</tr>

{% for e in evidences %}
<tr>
<td>{{ e.id }}</td>
<td>{{ e.file_name }}</td>
<td style="font-size:12px;">{{ e.hash_value }}</td>
<td>{{ e.status }}</td>
</tr>
{% endfor %}

</table>

</div>

</body>
</html>
